spring.application.name=api-gateway
server.port=9090

eureka.client.service-url.defaultZone=http://localhost:8761/eureka

spring.cloud.gateway.mvc.routes[0].id=greet-service
spring.cloud.gateway.mvc.routes[0].uri=lb://GREET-SERVICE
spring.cloud.gateway.mvc.routes[0].predicates[0]=Path=/greet-service/**
spring.cloud.gateway.mvc.routes[0].filters[0]=StripPrefix=1